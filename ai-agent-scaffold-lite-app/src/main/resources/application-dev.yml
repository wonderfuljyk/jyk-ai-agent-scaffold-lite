server:
  port: 8092

# 线程池配置
thread:
  pool:
    executor:
      config:
        core-pool-size: 20
        max-pool-size: 50
        keep-alive-time: 5000
        block-queue-size: 5000
        policy: CallerRunsPolicy

# 数据库配置；启动时配置数据库资源信息
spring:
  config:
    import:
#      - classpath:agent/test-agent-02.yml
#     - classpath:agent/test-agent.yml
      - classpath:agent/only-one-agent.yml
#      - classpath:agent/parallel_research_app.yml
#      - classpath:agent/demo.yml
#      - classpath:agent/mcp.yml

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  hikari:
    pool-name: Retail_HikariCP
    minimum-idle: 15 #最小空闲连接数量
    idle-timeout: 180000 #空闲连接存活最大时间，默认600000（10分钟）
    maximum-pool-size: 25 #连接池最大连接数，默认是10
    auto-commit: true  #此属性控制从池返回的连接的默认自动提交行为,默认值：true
    max-lifetime: 1800000 #此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认1800000即30分钟
    connection-timeout: 30000 #数据库连接超时时间,默认30秒，即30000
    connection-test-query: SELECT 1
  type: com.zaxxer.hikari.HikariDataSource

# MyBatis 配置【如需使用记得打开】
#mybatis:
#  mapper-locations: classpath:/mybatis/mapper/*.xml
#  config-location:  classpath:/mybatis/config/mybatis-config.xml

# Agent 会话 Redis 配置
agent:
  session:
    redis:
      ttl-seconds: 7200
      max-turns: 20
      summary-threshold: 10
      summary-window-size: 15
      summary-max-words: 200
  llm:
    resilience:
      enabled: true
      max-retries: 3
      initial-backoff-ms: 1000
      backoff-multiplier: 2.0
      max-backoff-ms: 10000
      circuit-breaker-threshold: 5
      circuit-breaker-timeout-ms: 60000
      default-fallback-reply: "抱歉，AI 服务暂时不可用，请稍后重试。"
      llm-timeout-seconds: 300
      tool-timeout-seconds: 100
      workflow-timeout-seconds: 120

  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-production-use-env-var}
      expiration-ms: 3600000

